name: Update News to Firebase

on:
  schedule:
    - cron: '0 * * * *'  # รันทุกต้นชั่วโมง
  workflow_dispatch:      # ปุ่มกดรันเองหน้าเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests firebase-admin google-generativeai beautifulsoup4 lxml

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py